<!DOCTYPE html>

<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Wali Murid - Sistem Asesmen Anak TK</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
<div class="login-container">
    <div class="login-box">
        <div class="login-header">
            <div class="school-logo mb-3 mx-auto" style="width: 60px; height: 60px; font-size: 28px;">
                TK
            </div>
            <h1>Login</h1>
            <p>Masukkan kredensial Anda untuk melanjutkan</p>
        </div>

        <form id="loginForm">
            <div class="mb-4">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text" style="background-color: #F8F9FA; border: 1px solid var(--border-color);">
                        <i class="fas fa-user" style="color: var(--primary-color);"></i>
                    </span>
                    <input
                        type="text"
                        class="form-control"
                        id="username"
                        placeholder="Masukkan username"
                    >
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text" style="background-color: #F8F9FA; border: 1px solid var(--border-color);">
                        <i class="fas fa-lock" style="color: var(--primary-color);"></i>
                    </span>

                    <input
                        type="password"
                        class="form-control"
                        id="password"
                        placeholder="Masukkan password"
                    >

                    <button
                        class="btn btn-outline-secondary"
                        type="button"
                        id="togglePassword"
                    >
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input
                        class="form-check-input"
                        type="checkbox"
                        id="remember"
                        style="border-color: var(--primary-color);"
                    >
                    <label class="form-check-label" for="remember">
                        Ingat saya
                    </label>
                </div>

                <a
                    href="#"
                    class="text-decoration-none"
                    style="color: var(--primary-color); font-weight: 500;"
                >
                    Lupa password?
                </a>
            </div>

            <button
                type="submit"
                class="btn btn-primary w-100 fw-bold py-2 mb-3"
            >
                Login
            </button>
        </form>

        <div class="text-center">
            <a
                href="index.html"
                class="text-decoration-none d-block mt-3"
                style="color: var(--primary-color); font-weight: 500;"
            >
                <i class="fas fa-arrow-left"></i> Kembali
            </a>
        </div>
    </div>
</div>

<script>
    // Tampilkan / sembunyikan password
    document.getElementById('togglePassword').addEventListener('click', function () {
        const passwordInput = document.getElementById('password');
        const icon = this.querySelector('i');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    });

    // Langsung masuk dashboard tanpa autentikasi
    document.getElementById('loginForm').addEventListener('submit', function (e) {
        e.preventDefault();

        // Redirect ke dashboard wali
        window.location.href = 'dashboard-wali.html';
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
