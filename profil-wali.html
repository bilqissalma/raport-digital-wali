<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raport Digital - Mobile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root{--primary:#0077B6;--secondary:#FFC107;}
body{
    background:var(--bg);
    font-family:'Segoe UI', sans-serif;
    overflow-x:hidden;
    position:relative;
}
.card{border:none;border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.08);margin-bottom:16px}
.header-card{background:linear-gradient(135deg,#0077B6,#00A8E8);color:#fff}
.summary-banner{background:linear-gradient(135deg,#FFC107,#FFD54F)}
.badge.bg-primary{
        background:var(--secondary) !important;
        color:#333;
        font-weight:600;
    }
    /* =========================
       BACKGROUND BUBBLE
    ========================= */
    
    body::before{
        content:'';
        width:250px;
        height:250px;
        background:rgba(0,119,182,.08);
        border-radius:50%;
        position:fixed;
        top:-80px;
        right:-80px;
        z-index:-1;
        animation:float1 8s ease-in-out infinite;
    }
    
    body::after{
        content:'';
        width:180px;
        height:180px;
        background:rgba(255,193,7,.15);
        border-radius:50%;
        position:fixed;
        bottom:-50px;
        left:-50px;
        z-index:-1;
        animation:float2 10s ease-in-out infinite;
    }
    
    @keyframes float1{
        0%,100%{
            transform:translateY(0);
        }
        50%{
            transform:translateY(-20px);
        }
    }
    
    @keyframes float2{
        0%,100%{
            transform:translateY(0);
        }
        50%{
            transform:translateY(25px);
        }
    }
.user-avatar{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#fff;
    color:#0077B6;
    display:flex;align-items:center;
    justify-content:center;
    font-weight:bold;
    animation:pulse 3s infinite;
}
.user-avatar2{
        width:55px;
        height:55px;
        border-radius:50%;
        background:linear-gradient(
            135deg,
            var(--primary),
            #00A8E8
        );
        color:white;
        display:flex;
        align-items:center;
        justify-content:center;
        font-weight:bold;
        box-shadow:0 4px 12px rgba(0,119,182,.25);
    
        animation:pulse 3s infinite;
    }
@keyframes pulse{
    
    0%{
        box-shadow:0 0 0 0 rgba(255,193,7,.6);
    }

    70%{
        box-shadow:0 0 0 15px rgba(255,193,7,0);
    }

    100%{
        box-shadow:0 0 0 0 rgba(255,193,7,0);
    }

}
.progress{height:10px;border-radius:20px}
.progress-bar{border-radius:20px;background:#FFC107}
.fade-in{animation:fade .8s ease}
@keyframes fade{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}
.header-card{
    background:linear-gradient(
        135deg,
        #0077B6,
        #00A8E8
    );
    color:white;
}
.summary-banner{
    background:linear-gradient(
        135deg,
        #FFC107,
        #FFD95A
    );
}

.floating-star{
    animation:floatStar 3s ease-in-out infinite;
}

@keyframes floatStar{
    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-8px);
    }
}
.progress-bar{
    animation:loadProgress 2s ease;
}

@keyframes loadProgress{
    from{
        width:0;
    }
}
.fade-in{
    opacity:0;
    animation:fadeIn .8s ease forwards;
}

.delay-1{
    animation-delay:.2s;
}

.delay-2{
    animation-delay:.4s;
}

.delay-3{
    animation-delay:.6s;
}

.delay-4{
    animation-delay:.8s;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
.teacher-note{
    border-left:5px solid #FFC107;
    background:#FFF9E6;
}
.btn-warning{
    background:#FFC107;
    border:none;
    color:#333;
    font-weight:600;
}

.btn-warning:hover{
    transform:translateY(-3px);
}
.btn-primary{
        background:var(--primary);
        border:none;
        transition:.3s;
    }
    
    .btn-primary:hover{
        background:var(--primary-dark);
        transform:translateY(-2px);
    }
    
    .btn-outline-primary{
        transition:.3s;
    }
    
    .btn-outline-primary:hover{
        transform:translateY(-2px);
    }
.raport-highlight{
    position:relative;
}

.raport-highlight::before{
    content:'';
    position:absolute;
    inset:0;
    border-radius:20px;
    padding:2px;

    background:
    linear-gradient(
        135deg,
        #FFC107,
        #0077B6
    );
    opacity:.4;
}
.modal-content{
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.form-select{
    border-radius:12px;
    padding:12px;
}

.modal-header{
    border-bottom:1px solid #f0f0f0;
}

.modal-footer{
    border-top:1px solid #f0f0f0;
}
</style>
</head>

<body>
<div class="container py-4">
    <div class="bubble bubble1"></div>
        <div class="bubble bubble2"></div>

        <div class="card header-card mb-4 fade-in">
            <div class="card-body d-flex justify-content-between align-items-center">
        
                <div>
                    <h1 class="mb-0 fw-bold">
                        Raport Digital
                    </h1>
                </div>
        
                <div class="user-avatar">
                    HH
                </div>
        
            </div>
        </div>

        <div class="card mb-4 fade-in">

            <div class="card-body text-center">
        
                <div class="position-relative d-inline-block">
        
                    <img src="https://i.pravatar.cc/150?img=32"
                         class="rounded-circle shadow"
                         width="100"
                         height="100">
        
                    <button
                        class="btn btn-warning btn-sm rounded-circle position-absolute bottom-0 end-0">
        
                        <i class="fas fa-camera"></i>
        
                    </button>
        
                </div>
        
                <h5 class="fw-bold mt-3 mb-1">
                    Hana Hidayati
                </h5>
        
                <p class="text-muted mb-0">
                    Wali Ahmad Rizki Pratama
                </p>
            </div>
        </div>

        <div class="card mb-4 fade-in delay-1">

            <div class="card-header bg-white fw-bold">
        
                <i class="fas fa-user-shield text-primary"></i>
                Informasi Wali
        
            </div>
        
            <div class="card-body">
        
                <div class="mb-3">
        
                    <small class="text-muted">
                        Nama Wali
                    </small>
        
                    <div class="fw-bold">
                        Hana Hidayati
                    </div>
        
                </div>
        
                <div class="mb-3">
        
                    <small class="text-muted">
                        Nama Anak
                    </small>
        
                    <div class="fw-bold">
                        Ahmad Rizki Pratama
                    </div>
        
                </div>
        
                <div class="mb-3">
        
                    <small class="text-muted">
                        Kelas
                    </small>
        
                    <div class="fw-bold">
                        Kelas B
                    </div>
        
                </div>
        
                <div>
        
                    <small class="text-muted">
                        Status Akun
                    </small>
        
                    <div class="mt-1">
        
                        <span class="badge bg-success">
                            Aktif
                        </span>
        
                    </div>
        
                </div>
        
            </div>
        
        </div>

        <div class="card mb-4 fade-in delay-2">

            <div class="card-header bg-white fw-bold">
        
                <i class="fas fa-cog text-primary"></i>
                Data Akun
        
            </div>
        
            <div class="card-body">
        
                <div class="mb-3">
        
                    <label class="form-label fw-semibold">
                        Username
                    </label>
        
                    <input
                        type="text"
                        class="form-control"
                        value="hanahidayati">
        
                </div>
        
                <div class="mb-3">
        
                    <label class="form-label fw-semibold">
                        Nomor HP
                    </label>
        
                    <input
                        type="text"
                        class="form-control"
                        value="081234567890">
        
                </div>
        
                <div class="mb-3">
        
                    <label class="form-label fw-semibold">
                        Foto Profil
                    </label>
        
                    <input
                        type="file"
                        class="form-control">
        
                </div>
        
                <button
                    class="btn btn-outline-primary w-100"
                    data-bs-toggle="modal"
                    data-bs-target="#passwordModal">
        
                    <i class="fas fa-key"></i>
                    Ubah Password
        
                </button>
        
            </div>
        
        </div>

        <div class="d-grid gap-2 fade-in delay-3">

            <button class="btn btn-primary">
        
                <i class="fas fa-save"></i>
                Simpan Perubahan
        
            </button>
        
            <a href="dashboard-wali.html"
               class="btn btn-outline-primary">
        
                <i class="fas fa-arrow-left"></i>
                Kembali ke Dashboard
        
            </a>
        
        </div>

        <div class="modal fade"
     id="passwordModal"
     tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    <i class="fas fa-lock text-primary"></i>
                    Ubah Password

                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <div class="mb-3">

                    <label class="form-label">
                        Password Lama
                    </label>

                    <input
                        type="password"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Password Baru
                    </label>

                    <input
                        type="password"
                        class="form-control">

                </div>

                <div>

                    <label class="form-label">
                        Konfirmasi Password Baru
                    </label>

                    <input
                        type="password"
                        class="form-control">

                </div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Batal

                </button>

                <button class="btn btn-primary">

                    Simpan

                </button>

            </div>

        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
